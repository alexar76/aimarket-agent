name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Require PyPI API token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${PYPI_API_TOKEN}" ]]; then
            echo "::error::Missing repository secret PYPI_API_TOKEN."
            echo "Add it: Settings → Secrets and variables → Actions → New repository secret"
            echo "Create token: https://pypi.org/manage/account/token/"
            exit 1
          fi

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          ls -la dist/

      - name: Upload to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/* \
            --username __token__ \
            --password "$PYPI_API_TOKEN" \
            --non-interactive
