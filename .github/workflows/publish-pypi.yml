name: Publish to PyPI

# Publishes aimarket-agent to PyPI via **Trusted Publishing (OIDC)** — no API token stored.
# One-time setup: PyPI → project aimarket-agent → Manage → Publishing → add a GitHub Actions
# trusted publisher: owner alexar76, repository aimarket-agent, workflow filename
# publish-pypi.yml (leave "Environment name" blank to match this workflow).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      # Uses OIDC automatically (id-token: write, no password) — uploads dist/*.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
